.cards{

.card{
    background:#141414;
    border-radius:18px;
    overflow:hidden;
    text-decoration:none;
    color:#fff;
    transition:.35s;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
    display:block;
}

.card-content{
    padding:22px;
}

.card h2{
    margin-bottom:10px;
    color:#f5d06f;
}

.card p{
    color:#ccc;
    margin-bottom:20px;
}

.button{
    display:inline-block;
    padding:10px 22px;
    background:#f5d06f;
    color:#111;
    border-radius:30px;
    font-weight:bold;
}
</style>
